# Car Hunt — scheduled used-car search (trial)
#
# Runs the skills/car-hunt skill in automated scheduled mode via
# anthropics/claude-code-action. Replaces the Claude Desktop Routine.
#
# TRIAL PHASE: workflow_dispatch only. Once a manual run shows acceptable
# source coverage (compare TRIAL DIAGNOSTICS in the run summary against a
# recent Desktop Routine run), add the cron triggers:
#
#   schedule:
#     - cron: '0 13 * * *'   # ~7:00 AM Central (morning run)
#     - cron: '0 21 * * *'   # ~3:00 PM Central (afternoon run)
#
# Persistence: dedup state lives on the orphan branch `car-hunt-state` as
# active-listings.json — main is never written by this workflow. Run
# summaries are posted as comments on the rolling issue "Car Hunt — Run Log".

name: Car Hunt

on:
  # TEMPORARY (remove before merge): lets the trial run from this branch,
  # since workflow_dispatch only registers once the file is on the default
  # branch. claude-code-action rejects `push` events, so use pull_request.
  # PR-triggered runs are always forced to dry-run (see DRY_RUN below).
  pull_request:
    branches: [main]
    paths: ['.github/workflows/car-hunt.yml']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: report to step summary only (no issue comment, no state update)"
        type: boolean
        default: false

permissions:
  contents: write   # push dedup state to the car-hunt-state branch
  issues: write     # comment on the run-log issue
  id-token: write

concurrency:
  group: car-hunt
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # secrets context is unavailable in step-level `if`; evaluate here
      TS_ENABLED: ${{ secrets.TS_OAUTH_CLIENT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load dedup state
        run: |
          mkdir -p "$RUNNER_TEMP/car-hunt"
          if git fetch origin car-hunt-state 2>/dev/null && \
             git show FETCH_HEAD:active-listings.json > "$RUNNER_TEMP/car-hunt/active-listings.json" 2>/dev/null; then
            echo "Loaded prior state: $(jq length "$RUNNER_TEMP/car-hunt/active-listings.json") listings"
          else
            echo '[]' > "$RUNNER_TEMP/car-hunt/active-listings.json"
            echo "No prior state — treating all results as new"
          fi

      # Headless browser for JS-rendered listing-search pages (AutoTrader,
      # CarGurus) — trial run showed WebSearch surfaces no individual listing
      # URLs for those sources. Install the MCP package and the chromium
      # build matching its bundled playwright version.
      - name: Set up Playwright MCP
        run: |
          npm install --no-fund --no-audit --prefix "$RUNNER_TEMP/pwmcp" @playwright/mcp@0.0.75
          "$RUNNER_TEMP/pwmcp/node_modules/.bin/playwright" install --with-deps chromium
          cat > "$RUNNER_TEMP/mcp-config.json" <<EOF
          {
            "mcpServers": {
              "playwright": {
                "command": "$RUNNER_TEMP/pwmcp/node_modules/.bin/playwright-mcp",
                "args": ["--headless", "--isolated"]
              }
            }
          }
          EOF

      # Optional residential egress (fixes AT/CG datacenter-IP bot walls):
      # when the TS_OAUTH_* secrets are set, join the tailnet and route ALL
      # runner egress through the home exit node (QNAP, hostname
      # "qnap-exit") so WebFetch and the Playwright browser leave from a
      # residential IP. WebSearch is unaffected (executes Anthropic-side).
      # Both steps no-op until the secrets exist, so the workflow works
      # before the NAS is set up.
      - name: Connect to tailnet
        if: ${{ env.TS_ENABLED == 'true' }}
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Route egress through home exit node
        if: ${{ env.TS_ENABLED == 'true' }}
        run: |
          before=$(curl -s --max-time 10 https://api.ipify.org || echo unknown)
          sudo tailscale set --exit-node=qnap-exit
          sleep 3
          after=$(curl -s --max-time 20 https://api.ipify.org || echo unknown)
          echo "egress IP: $before -> $after"
          if [ "$after" = "unknown" ] || [ "$before" = "$after" ]; then
            echo "::error::exit-node routing did not take effect (egress IP unchanged)"
            exit 1
          fi

      - name: Run car hunt (Claude)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'pull_request' && true || inputs.dry_run }}
          # Headless Auto.dev auth — the SDK reads this env var directly
          # (`auto login` browser sessions don't exist in CI). NOTE: `whoami`
          # only checks the browser-login session and says "Not logged in"
          # even when this key is valid, so the prompt gates on a real
          # listings probe instead of whoami.
          AUTODEV_API_KEY: ${{ secrets.AUTODEV_API_KEY }}
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pass the workflow's GITHUB_TOKEN explicitly so the job-level
          # `permissions: issues: write` grant applies (see feature-ideation
          # workflow for why the default app token silently fails mutations).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --mcp-config ${{ runner.temp }}/mcp-config.json
            --allowedTools Bash,Read,Write,Glob,Grep,WebSearch,WebFetch,mcp__playwright
          prompt: |
            You are running the car-hunt skill in automated scheduled mode
            (TRIAL RUN in GitHub Actions). Your goal is to find new high-value
            used cars, deduplicate against prior runs, and report.

            ## Step 0: Read the full skill instructions
            Read `skills/car-hunt/SKILL.md` in this checkout. It contains the
            complete specification for every step. Follow it exactly, subject
            to the scheduled-mode overrides below.

            ## Scheduled mode rules (override interactive defaults)

            1. **Skip Step 1 (reliability research)** — use only the static
               reference table in SKILL.md.
            2. **Run Step 2 (listing search)** across AutoTrader, CarGurus,
               Craigslist, and Auto.dev. The Chrome MCP is NOT available — for
               Facebook Marketplace use Option A only (WebSearch for
               `site:facebook.com/marketplace/item ...`). If no FB item URLs
               surface, include the manual-search row as the skill specifies.

               **Playwright MCP override for AutoTrader and CarGurus:** a
               headless browser is available via the `playwright` MCP server.
               For these two sources, OVERRIDE the skill's WebSearch-first
               approach: navigate the browser directly to the search-results
               URL (e.g. autotrader.com/cars-for-sale with make/model/zip/
               price filters; cargurus.com inventory search), wait for
               listings to render, and extract listing URL, price, mileage,
               year, trim, and dealer from the rendered page. Paginate up to
               3 pages per model. Fall back to the WebSearch approach only if
               the browser pages fail to render listings.
               Browser guardrails: NEVER navigate to facebook.com or any
               login-gated site with the browser, never enter credentials,
               and never submit forms other than search filters. The browser
               is for rendering public listing-search pages only.
            3. **Run Steps 3 and 4** — CPM scoring and ranked output.
            4. **Deduplicate against prior runs:** the state file is at
               `${{ runner.temp }}/car-hunt/active-listings.json` — a JSON
               array of objects with keys `url`, `make`, `model`, `year`,
               `price`, `miles`, `cpm`, `source`, `first_seen`. Compare link
               URLs and surface ONLY listings not present. An empty array
               means first run — treat all results as new.
            5. **Update state:** after scoring, rewrite that same file in
               place — keep all prior entries and append each new listing
               (set `first_seen` to today's date from `date -u +%F`). A later
               workflow step commits it; do NOT run git yourself.
            6. **No Google Drive / no MCP tools** — they are not available in
               this environment. Persistence is the state file only.
            7. **Skip Step 7 (outreach)** — requires Chrome MCP.

            ## Search parameters
            - Makes/models: Honda Civic, Honda Accord, Toyota Camry
            - ZIP: 35243 (Birmingham, AL area)
            - Radius: 200 miles
            - Max price: $6,000
            - Year range: 2002 – current year
            - Max odometer: 250,000 miles

            ## Auto.dev CLI
            Auth is via the `AUTODEV_API_KEY` env var (already set), NOT a
            browser login — do NOT use `whoami` as the auth gate (it only
            checks browser-login sessions and reports "Not logged in" even
            when the API key is valid). Instead, probe with a real call:
            `npx @auto.dev/sdk listings --make Honda --model Civic --limit 1 --json`.
            If it returns listing JSON, Auto.dev is available — proceed per
            SKILL.md (this probe also satisfies its inspect-before-batch
            rule). If it returns 401/unauthorized or the env var is empty,
            skip Auto.dev entirely and note it in the summary. Do not block
            on it.

            ## Reporting (machine-readable contract — a later step validates this)
            Write BOTH files below. The job FAILS if run-results.json is
            missing or malformed, so write them even when every source fails.

            1. `${{ runner.temp }}/car-hunt/run-results.json` — exactly this
               shape (no extra top-level keys; use 0/[]/null when empty):
               {
                 "totals": { "scored": <int>, "new": <int> },
                 "top_new": [            // up to 3, ranked by Adj.CPM
                   { "make": str, "model": str, "year": int, "price": int,
                     "miles": int, "cpm": num, "adj_cpm": num,
                     "location": str, "url": str }
                 ],
                 "sources": [            // one entry per source, ALWAYS all 5:
                                         // autotrader, cargurus, craigslist,
                                         // facebook, autodev
                   { "name": str,
                     "status": "ok" | "degraded" | "blocked" | "skipped",
                     "websearch_queries": int, "urls_found": int,
                     "fetch_attempts": int, "fetch_success": int,
                     "fetch_blocked": int, "notes": str }
                 ],
                 "ip_blocking_observed": bool,
                 "notes": str
               }
            2. `${{ runner.temp }}/car-hunt/run-summary.md` — the human
               summary: totals, top 3 new listings (Make/Model/Year · Price ·
               CPM · Location · Link), failed/skipped sources and why, and a
               TRIAL DIAGNOSTICS section expanding on the per-source numbers.

            Then append run-summary.md to the file named by
            `$GITHUB_STEP_SUMMARY`. If `$DRY_RUN` is not "true", also post
            run-summary.md as a comment on the rolling run-log issue: find
            the open issue titled exactly "Car Hunt — Run Log" via
            `gh issue list --state open --search 'Car Hunt — Run Log in:title' --json number,title`;
            create it if missing (`gh issue create`), then
            `gh issue comment` with the summary.

      # The run's "test": success means "Claude exited 0 AND produced results
      # matching the contract", not just that the agent didn't crash. Catches
      # silent-failure runs (e.g. every source blocked but nothing reported).
      - name: Validate results contract
        run: |
          R="$RUNNER_TEMP/car-hunt/run-results.json"
          S="$RUNNER_TEMP/car-hunt/run-summary.md"
          fail() { echo "::error::results contract violation: $1"; exit 1; }
          [ -s "$R" ] || fail "run-results.json missing or empty"
          [ -s "$S" ] || fail "run-summary.md missing or empty"
          jq empty "$R" || fail "run-results.json is not valid JSON"
          jq -e '
            (.totals.scored | type == "number") and
            (.totals.new    | type == "number") and
            (.top_new       | type == "array") and
            (.ip_blocking_observed | type == "boolean") and
            (.sources | type == "array" and length == 5) and
            ([.sources[].name] | sort ==
              ["autodev","autotrader","cargurus","craigslist","facebook"]) and
            (all(.sources[];
              (.status | IN("ok","degraded","blocked","skipped")) and
              (.websearch_queries|type=="number") and (.urls_found|type=="number") and
              (.fetch_attempts|type=="number") and (.fetch_success|type=="number") and
              (.fetch_blocked|type=="number")))
          ' "$R" > /dev/null || fail "run-results.json does not match the schema"
          # state file must still be a JSON array after Claude's rewrite
          jq -e 'type == "array"' "$RUNNER_TEMP/car-hunt/active-listings.json" > /dev/null \
            || fail "active-listings.json is no longer a JSON array"
          echo "Contract OK: $(jq -r '"scored=\(.totals.scored) new=\(.totals.new) ip_blocking=\(.ip_blocking_observed)"' "$R")"

      # Make results machine-fetchable (step summaries have no read API):
      #   gh run download <run-id> -n car-hunt-results -R don-petry/don-petry
      - name: Upload results artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: car-hunt-results
          path: ${{ runner.temp }}/car-hunt/
          if-no-files-found: warn
          retention-days: 30

      - name: Persist dedup state
        if: ${{ github.event_name != 'pull_request' && !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git fetch origin car-hunt-state 2>/dev/null; then
            git checkout -B car-hunt-state FETCH_HEAD
          else
            git checkout --orphan car-hunt-state
            git rm -rfq . 2>/dev/null || true
          fi
          cp "$RUNNER_TEMP/car-hunt/active-listings.json" active-listings.json
          git add active-listings.json
          if git diff --cached --quiet; then
            echo "State unchanged — nothing to push"
          else
            git commit -m "car-hunt: state update $(date -u +%FT%TZ) (run ${{ github.run_id }})"
            git push origin car-hunt-state
          fi
